<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise for You!</title>
    <style>
        /* Building the look - CSS */
        body {
            background-color: #ffeef2; /* Light pinkish background */
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #ff4d6d;
            font-size: 2.5rem;
        }
        p {
            color: #555;
            font-size: 1.2rem;
        }
        .heart {
            color: #ff4d6d;
            font-size: 50px;
            animation: beat 1s infinite alternate; /* Beating heart effect */
        }
        @keyframes beat {
            to { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">❤️</div>
        <h1>Hi Princess!</h1>
        <p>I built this small web app just for you. <br> Still learning, but started with you!</p>
    </div>

</body>
</html>
