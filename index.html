<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Prank! ❤️</title>
    <style>
        body {
            background-color: #ffeef2;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 320px;
        }
        h1 { color: #ff4d6d; }
        .buttons {
            margin-top: 30px;
            height: 50px;
            position: relative;
        }
        button {
            padding: 10px 25px;
            font-size: 1.1rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            position: absolute;
            transition: 0.1s;
        }
        #yesBtn { 
            background-color: #ff4d6d; 
            color: white;
            left: 20px;
        }
        #noBtn {
            background-color: #ddd;
            color: #333;
            left: 180px;
        }
    </style>
</head>
<body>

    <div class="container" id="main-box">
        <h1>Hi Princess! ❤️</h1>
        <p>Will you be mine forever?</p>
        <div class="buttons">
            <button id="yesBtn" onmouseover="moveYesButton()">Yes</button>
            <button id="noBtn" onclick="rejected()">No</button>
        </div>
    </div>

    <script>
        // YES button escape aagura logic
        function moveYesButton() {
            const yesBtn = document.getElementById('yesBtn');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            
            yesBtn.style.left = x + "px";
            yesBtn.style.top = y + "px";
        }

        // NO click panna enna nadakkanum
        function rejected() {
            const box = document.getElementById('main-box');
            box.innerHTML = "<h1>Oh No! 💔</h1><p>Better luck next time, Poorna!</p>";
        }
    </script>

</body>
</html>
