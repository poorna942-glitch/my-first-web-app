<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Architect Challenge ☁️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --aws-orange: #ff9900; --dark-blue: #232f3e; --bg: #f2f3f3; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; text-align: center; }
        header { background: var(--dark-blue); color: white; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .container { max-width: 700px; margin: 30px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; font-weight: bold; color: var(--dark-blue); }
        .question-box { margin-bottom: 30px; padding: 20px; border-left: 5px solid var(--aws-orange); background: #fffaf0; text-align: left; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        button { padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; transition: 0.3s; font-size: 1rem; text-align: left; }
        button:hover { background: #eee; border-color: var(--aws-orange); }
        .correct { background: #d4edda !important; border-color: #28a745 !important; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; }
        #next-btn { margin-top: 25px; background: var(--aws-orange); color: white; border: none; padding: 12px 30px; font-weight: bold; display: none; cursor: pointer; border-radius: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>DevOps Architect Challenge 🚀</h1>
    <p>Master AWS & DevOps through Play</p>
</header>

<div class="container" id="game-container">
    <div class="stats">
        <span>Level: <span id="level-display">1</span>/10</span>
        <span>Score: <span id="score-display">0</span></span>
    </div>

    <div id="quiz">
        <div class="question-box">
            <h3 id="question-text">Loading first challenge...</h3>
        </div>
        <div class="options-grid" id="options-container">
            </div>
        <button id="next-btn" onclick="loadNextQuestion()">Next Challenge →</button>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Challenge Complete! 🏆</h2>
        <p id="final-score"></p>
        <button onclick="location.reload()" style="background: var(--dark-blue); color: white; text-align: center;">Retry Certification</button>
    </div>
</div>

<script>
    const quizData = [
        {
            q: "INTERVIEW MUST: You need to change file permissions so only the owner can Read, Write, and Execute. Command?",
            a: ["chmod 777 filename", "chmod 700 filename", "chown 755 filename", "chmod 644 filename"],
            c: 1,
            topic: "Linux Security"
        },
        {
            q: "NETWORKING: Which AWS component allows your VPC instances to talk to the Internet?",
            a: ["Virtual Private Gateway", "NAT Gateway", "Internet Gateway (IGW)", "Security Group"],
            c: 2,
            topic: "VPC"
        },
        {
            q: "COMPUTE: You need to host a simple website with very low cost and auto-scaling. Which service?",
            a: ["AWS EC2", "AWS Lambda", "AWS S3 Static Hosting", "AWS Lightsail"],
            c: 2,
            topic: "S3"
        },
        {
            q: "STORAGE: Which S3 Storage Class is best for archiving data for 7-10 years (rarely accessed)?",
            a: ["Standard", "Intelligent Tiering", "Glacier Deep Archive", "Standard-IA"],
            c: 2,
            topic: "S3"
        },
        {
            q: "SECURITY: You want to give an EC2 instance permission to upload files to S3. Best practice?",
            a: ["Hardcode IAM User Keys in code", "Use IAM Roles for EC2", "Make S3 bucket Public", "Share Root Account credentials"],
            c: 1,
            topic: "IAM"
        },
        {
            q: "DEVOPS: Which file is used to define the steps of a Docker image build?",
            a: ["docker-compose.yml", "jenkinsfile", "Dockerfile", "image.spec"],
            c: 2,
            topic: "Docker"
        }
        // Innum 20-30 questions neenga add pannalam!
    ];

    let currentQ = 0;
    let score = 0;

    function loadQuestion() {
        const q = quizData[currentQ];
        document.getElementById("question-text").innerText = q.q;
        document.getElementById("level-display").innerText = currentQ + 1;
        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";

        q.a.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.innerText = opt;
            btn.onclick = () => selectOption(index);
            optionsContainer.appendChild(btn);
        });
        document.getElementById("next-btn").style.display = "none";
    }

    function selectOption(index) {
        const correct = quizData[currentQ].c;
        const btns = document.querySelectorAll(".options-grid button");
        
        if(index === correct) {
            btns[index].classList.add("correct");
            score += 10;
            document.getElementById("score-display").innerText = score;
            confetti({ particleCount: 50, spread: 60 });
        } else {
            btns[index].classList.add("wrong");
            btns[correct].classList.add("correct");
        }

        btns.forEach(b => b.disabled = true);
        document.getElementById("next-btn").style.display = "block";
    }

    function loadNextQuestion() {
        currentQ++;
        if(currentQ < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById("quiz").classList.add("hidden");
            document.getElementById("result-screen").classList.remove("hidden");
            document.getElementById("final-score").innerText = `Total Score: ${score}/ ${quizData.length * 10}`;
        }
    }

    loadQuestion();
</script>

</body>
</html>
